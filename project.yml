name: WotlweduIOS
options:
  bundleIdPrefix: com.wotlwedu
  deploymentTarget:
    iOS: "16.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
    TARGETED_DEVICE_FAMILY: "1,2"
    PRODUCT_BUNDLE_IDENTIFIER: com.wotlwedu.mobile
    INFOPLIST_FILE: WotlweduIOS/Resources/Info.plist
    GOOGLE_IOS_CLIENT_ID: ""
    GOOGLE_SERVER_CLIENT_ID: ""
    GOOGLE_REVERSED_CLIENT_ID: ""
packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 9.0.0
targets:
  WotlweduIOS:
    type: application
    platform: iOS
    sources:
      - path: WotlweduIOS
    resources:
      - path: WotlweduIOS/Resources
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
  WotlweduIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WotlweduIOSTests
    resources:
      - path: WotlweduIOSTests/Fixtures
    dependencies:
      - target: WotlweduIOS
  WotlweduIOSIntegrationTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WotlweduIOSIntegrationTests
    resources:
      - path: WotlweduIOSIntegrationTests/Fixtures
    dependencies:
      - target: WotlweduIOS
schemes:
  WotlweduIOS:
    build:
      targets:
        WotlweduIOS: all
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
